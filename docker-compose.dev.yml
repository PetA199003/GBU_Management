version: '3'

services:
  db:
    image: postgres:15-alpine
    container_name: gbu_postgres_dev
    environment:
      POSTGRES_USER: gbu_user
      POSTGRES_PASSWORD: gbu_password_2024
      POSTGRES_DB: gbu_app
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbu_user -d gbu_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gbu_app_dev
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://gbu_user:gbu_password_2024@db:5432/gbu_app?schema=public
      NEXTAUTH_SECRET: Jg5QaXU8+VGFmQqjt+KrxfT2Hs7Lp9Mn3Bv6Cx1Zy4=
      NEXTAUTH_URL: http://localhost:3003
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - dev_data:/app/data
    depends_on:
      - db
    restart: unless-stopped
    command: sh -c "npx prisma db push --accept-data-loss && npm run dev"

volumes:
  dev_data:
  postgres_dev_data:
