services:
  db:
    image: postgres:15-alpine
    container_name: gbu_postgres
    environment:
      - POSTGRES_USER=gbu_user
      - POSTGRES_PASSWORD=gbu_password_2024
      - POSTGRES_DB=gbu_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbu_user -d gbu_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gbu_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://gbu_user:gbu_password_2024@db:5432/gbu_app?schema=public
      - NEXTAUTH_SECRET=Jg5QaXU8+VGFmQqjt+KrxfT2Hs7Lp9Mn3Bv6Cx1Zy4=
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      # Persistente Daten für localStorage-Simulation
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app_data:
    driver: local
  postgres_data:
    driver: local